<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Brew & Bake</title>
    <style>
        /* CSS STYLES */
        :root {
            --primary-color: #6F4E37; /* Coffee Brown */
            --secondary-color: #D4A373; /* Latte */
            --bg-color: #FAEDCD; /* Cream */
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Navigation */
        nav {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-links li a:hover {
            color: var(--secondary-color);
        }

        /* Section Visibility */
        section {
            display: none; /* Hide all sections by default */
            padding: 3rem 5%;
            min-height: 80vh;
        }

        section.active {
            display: block; /* Show only the active section */
        }

        /* Home Section */
        #home {
            text-align: center;
            display: none; /* Handled by JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1000') center/cover;
            color: white;
            height: calc(100vh - 60px);
        }

        #home.active {
            display: flex;
        }

        #home h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        #home p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        /* Buttons */
        button {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--primary-color);
        }

        /* Menu Section */
        h2.section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .menu-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-5px);
        }

        .menu-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .menu-info {
            padding: 1.5rem;
        }

        .menu-info h3 {
            margin-bottom: 0.5rem;
        }

        .menu-info p {
            color: #777;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Cart Section */
        .cart-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .cart-item h4 {
            margin: 0;
        }

        .qty-controls button {
            padding: 0.2rem 0.5rem;
            margin: 0 0.5rem;
            background: #eee;
            color: #333;
        }

        .cart-summary {
            margin-top: 2rem;
            text-align: right;
        }

        .cart-summary h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .empty-cart {
            text-align: center;
            color: #777;
            padding: 2rem 0;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="switchView('home')">☕ Brew & Bake</div>
        <ul class="nav-links">
            <li><a onclick="switchView('home')">Home</a></li>
            <li><a onclick="switchView('menu')">Menu</a></li>
            <li><a onclick="switchView('cart')">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>

    <section id="home" class="active">
        <h1>Welcome to Brew & Bake</h1>
        <p>Freshly roasted coffee and artisanal pastries baked daily.</p>
        <button onclick="switchView('menu')">Explore Our Menu</button>
    </section>

    <section id="menu">
        <h2 class="section-title">Our Menu</h2>
        <div class="menu-grid" id="menu-grid">
            </div>
    </section>

    <section id="cart">
        <h2 class="section-title">Your Order</h2>
        <div class="cart-container">
            <div id="cart-items">
                </div>
            <div class="cart-summary">
                <h3>Total: $<span id="cart-total">0.00</span></h3>
                <button onclick="processCheckout()">Checkout Now</button>
            </div>
        </div>
    </section>

    <script>
        // 1. Data Store (Mock Database)
        const products = [
            { id: 1, name: "Classic Espresso", price: 3.50, image: "https://images.unsplash.com/photo-1510061164096-724f116cb79b?q=80&w=400" },
            { id: 2, name: "Vanilla Latte", price: 4.75, image: "https://images.unsplash.com/photo-1534778101976-62847782c213?q=80&w=400" },
            { id: 3, name: "Iced Caramel Macchiato", price: 5.00, image: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?q=80&w=400" },
            { id: 4, name: "Butter Croissant", price: 3.00, image: "https://images.unsplash.com/photo-1555507036-ab1e4006aaeb?q=80&w=400" },
            { id: 5, name: "Blueberry Muffin", price: 3.25, image: "https://images.unsplash.com/photo-1607958996333-41aef7caefaa?q=80&w=400" },
            { id: 6, name: "Avocado Toast", price: 6.50, image: "https://images.unsplash.com/photo-1541519227354-08fa5d50c44d?q=80&w=400" }
        ];

        // 2. State Management
        let cart = [];

        // 3. View Switcher (Navigation Logic)
        function switchView(viewId) {
            // Hide all sections
            document.querySelectorAll('section').forEach(section => {
                section.classList.remove('active');
            });
            // Show the target section
            document.getElementById(viewId).classList.add('active');
            
            // Scroll to top
            window.scrollTo(0,0);
        }

        // 4. Render Menu Items
        function renderMenu() {
            const menuGrid = document.getElementById('menu-grid');
            menuGrid.innerHTML = ''; // Clear existing

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <div class="menu-info">
                        <h3>${product.name}</h3>
                        <p>$${product.price.toFixed(2)}</p>
                        <button onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                `;
                menuGrid.appendChild(card);
            });
        }

        // 5. Cart Logic
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            // Small notification popup
            alert(`Added ${product.name} to your cart!`);
            
            updateCartUI();
        }

        function changeQuantity(productId, delta) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex > -1) {
                cart[itemIndex].quantity += delta;
                
                // Remove item if quantity goes to 0
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartContainer = document.getElementById('cart-items');
            const cartCountLabel = document.getElementById('cart-count');
            const cartTotalLabel = document.getElementById('cart-total');

            let totalItems = 0;
            let totalPrice = 0;

            if (cart.length === 0) {
                cartContainer.innerHTML = '<div class="empty-cart"><p>Your cart is currently empty. Go grab some coffee!</p></div>';
            } else {
                cartContainer.innerHTML = '';
                cart.forEach(item => {
                    totalItems += item.quantity;
                    totalPrice += (item.price * item.quantity);

                    const cartRow = document.createElement('div');
                    cartRow.className = 'cart-item';
                    cartRow.innerHTML = `
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <span>$${item.price.toFixed(2)} each</span>
                        </div>
                        <div class="qty-controls">
                            <button onclick="changeQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="changeQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div class="item-total">
                            <strong>$${(item.price * item.quantity).toFixed(2)}</strong>
                        </div>
                    `;
                    cartContainer.appendChild(cartRow);
                });
            }

            // Update Header and Summary
            cartCountLabel.textContent = totalItems;
            cartTotalLabel.textContent = totalPrice.toFixed(2);
        }

        // 6. Checkout Process
        function processCheckout() {
            if (cart.length === 0) {
                alert("Please add items to your cart before checking out.");
                return;
            }

            const total = document.getElementById('cart-total').textContent;
            
            // In a real app, this would send data to a server and a payment gateway
            alert(`Success! Your order total is $${total}. Your coffee is being prepared!`);
            
            // Clear cart and redirect to home
            cart = [];
            updateCartUI();
            switchView('home');
        }

        // 7. Initialization
        window.onload = () => {
            renderMenu();
            updateCartUI(); // Sets initial 0 state
        };
    </script>
</body>
</html>
